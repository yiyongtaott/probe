name: probe_app
description: "UltraLightProbe - 三端活动监控"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # HTTP / API
  http: ^1.2.0

  # WebView（App B 前端）
  webview_flutter: ^4.10.0

  # 后台周期性任务
  workmanager: 0.7.0

  # 前台常驻服务（Android）
  flutter_background_service: ^5.0.0

  # 硬件信息
  battery_plus: ^6.0.0
  network_info_plus: ^6.0.0

  # 本地存储
  shared_preferences: ^2.3.0
  webview_windows: ^0.4.0
  usage_stats: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
